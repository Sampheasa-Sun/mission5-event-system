<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Create Category - UniEvents</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col items-center justify-center py-12 px-4">
<main class="w-full max-w-[600px] mx-auto">
    <div class="bg-white rounded-lg p-8 shadow border border-slate-200">
        <div class="mb-8 text-center">
            <span class="material-symbols-outlined text-[#001e40] text-4xl mb-4">domain_add</span>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Add Department / Category</h1>
            <p class="text-sm text-slate-500">Create a new organizational category for future events.</p>
        </div>

        <form th:action="@{/admin/categories}" th:object="${category}" method="POST" class="space-y-6">
            <div>
                <label class="block font-semibold text-sm text-slate-700 mb-2">Category Name</label>
                <input type="text" th:field="*{name}" required class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded focus:border-[#003366] outline-none" placeholder="e.g., Athletics"/>
            </div>
            <div>
                <label class="block font-semibold text-sm text-slate-700 mb-2">Description</label>
                <textarea th:field="*{description}" rows="3" class="w-full p-4 bg-slate-50 border border-slate-300 rounded focus:border-[#003366] outline-none" placeholder="Briefly describe this category..."></textarea>
            </div>
            <div class="pt-4 flex flex-col space-y-4">
                <button type="submit" class="w-full bg-[#001e40] text-white font-bold py-3 rounded shadow hover:bg-blue-900 transition flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined">save</span> Save Category
                </button>
                <a th:href="@{/admin}" class="w-full text-center font-bold text-[#001e40] py-2 hover:text-blue-900">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
