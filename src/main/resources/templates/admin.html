<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Dashboard - Event System</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

<main class="flex-1 flex flex-col min-h-screen">
    <div class="bg-slate-900 text-white py-8 px-6 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-200">Admin Portal</h1>
                <p class="text-slate-300 mt-2">Manage institutional events and synchronize Redis cache.</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <a th:href="@{/admin/events/new}" class="bg-blue-600 text-white font-semibold py-2.5 px-6 rounded-lg shadow hover:bg-blue-500 transition flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">add_circle</span> Post New Event
                </a>
                <a th:href="@{/admin/categories/new}" class="bg-slate-200 text-slate-800 font-semibold py-2.5 px-6 rounded-lg shadow hover:bg-slate-300 transition flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">domain_add</span> Add Category
                </a>
                <form th:action="@{/admin/cache/refresh}" method="post" class="m-0">
                    <button type="submit" class="border-2 border-orange-500 text-orange-400 hover:bg-slate-800 font-semibold py-2 px-6 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">refresh</span> Force Refresh Cache
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="flex-1 p-6 max-w-7xl mx-auto w-full">
        <div th:if="${param.cacheRefreshed}" class="bg-green-50 border border-green-200 text-green-800 rounded-lg p-4 mb-8 flex items-start gap-3 shadow-sm">
            <span class="material-symbols-outlined text-green-600">check_circle</span>
            <div>
                <h3 class="font-bold">Success</h3>
                <p class="text-sm mt-1">Cache successfully refreshed! System data is now synchronized.</p>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow overflow-hidden">
            <div class="p-6 border-b border-slate-200">
                <h2 class="text-xl font-bold text-slate-800">Recent Events Registry</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm uppercase tracking-wider">
                        <th class="py-4 px-6 font-semibold w-12">ID</th>
                        <th class="py-4 px-6 font-semibold">Event Title</th>
                        <th class="py-4 px-6 font-semibold">Category</th>
                        <th class="py-4 px-6 font-semibold">Date</th>
                    </tr>
                    </thead>
                    <tbody class="text-sm text-slate-800 divide-y divide-slate-100">
                    <tr th:each="event : ${events}" class="hover:bg-slate-50 transition-colors">
                        <td class="py-4 px-6 text-slate-500 font-mono" th:text="${event.id}">1</td>
                        <td class="py-4 px-6 font-medium" th:text="${event.title}">Event Title</td>
                        <td class="py-4 px-6 text-slate-500" th:text="${event.category != null ? event.category.name : 'None'}">Category</td>
                        <td class="py-4 px-6 font-mono text-slate-500" th:text="${event.eventDate}">2024-01-01</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
